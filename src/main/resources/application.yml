server:
  port: 8080
  servlet:
    context-path: /v1

spring:
  application:
    name: endcareerai-platform

  # MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/ai_recruit_platform?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

    # Elasticsearch
    elasticsearch:
      uris: http://localhost:9200

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        concurrency: 3
        max-concurrency: 10
        prefetch: 1
        acknowledge-mode: manual

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-handlers-package: com.endcareerai.platform.config

# JWT
jwt:
  secret: EndCareerAi2026SecretKeyForJwtTokenGenerationMustBeLongEnough256Bits!!
  expiration: 86400000

# LLM (OpenAI 兼容接口，支持 OpenAI / DeepSeek / 通义千问等)
llm:
  base-url: https://api.openai.com          # LLM API 基础地址，可替换为其他兼容接口
  api-key: ${LLM_API_KEY:sk-your-api-key}   # API 密钥，建议通过环境变量 LLM_API_KEY 注入
  model: gpt-3.5-turbo                       # 模型名称
  temperature: 0.3                           # 生成温度，越低越确定性
  max-tokens: 2000                           # 最大生成 token 数
  connect-timeout: 10                        # 连接超时（秒）
  read-timeout: 60                           # 读取超时（秒）

# Logging
logging:
  level:
    com.endcareerai.platform: debug
    org.springframework.amqp: info
